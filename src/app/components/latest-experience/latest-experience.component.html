<section id="latest-experience" class="experience-section">
  <div class="container">
    <div class="section-header">
      <span class="section-tag">💼 {{ t('experience.title') }}</span>
      <h2 class="section-title">{{ t('experience.title') }}</h2>
      <p class="section-subtitle">{{ t('experience.subtitle') }}</p>
    </div>
    <div class="experience-timeline">
      <div
        class="experience-card"
        *ngFor="let exp of experiences"
        [class.current]="exp.current"
      >
        <div class="card-header">
          <div class="company-info">
            <h5 class="job-title">{{ exp.title }}</h5>
            <div class="company-line">
              <span class="company-name">
                <i class="fa fa-building"></i>{{ exp.company }}
              </span>
              <span class="client-name" *ngIf="exp.client">
                <i class="fa fa-briefcase"></i>{{ exp.client }}
              </span>
            </div>
          </div>
          <div class="card-meta">
            <span class="period"><i class="fa fa-calendar"></i>{{ exp.period }}</span>
            <span class="location"><i class="fa fa-map-marker"></i>{{ exp.location }}</span>
            <span class="badge-current" *ngIf="exp.current">{{ t('experience.current') }}</span>
          </div>
        </div>

        <p class="description">{{ exp.description }}</p>

        <div class="achievements" *ngIf="exp.achievements?.length">
          <p class="achievements-title"><i class="fa fa-star"></i> {{ t('experience.achievements') }}</p>
          <ul>
            <li *ngFor="let a of exp.achievements">{{ a }}</li>
          </ul>
        </div>

        <div class="tags">
          <span class="tag" *ngFor="let tag of exp.tags">{{ tag }}</span>
        </div>
      </div>
    </div>
  </div>
</section>
